# ScienceWorld IWM — Stage 1 (World-Modeling warm-up)
# Paper §3 + §B.6: 1 epoch on D_rollout, same lr/bs as IL

### model
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: scienceworld_iwm
dataset_dir: /mnt/data/xiangchao/verl-agent-ee-final/envs/scienceworld/data/sft
template: qwen3_5_nothink
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/scienceworld_iwm_stage1
logging_steps: 10
save_steps: 1000
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000

# SearchQA SR (Self-Reflection mixed with expert)
# Paper §4.3 mix D_refl with D_expert; §B.5 same settings as IL (3 epochs).
# NOTE: SearchQA 有 A 和 B 两个 reflection 版本，默认用 A；若用 B 把 dataset 改成
#       searchqa_expert,searchqa_reflection_b

### model
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset (mixed)
dataset: searchqa_expert,searchqa_reflection_a
dataset_dir: /mnt/data/xiangchao/verl-agent-ee-final/envs/searchqa/data/sft
mix_strategy: concat
template: qwen3_5_nothink
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/searchqa_sr
logging_steps: 10
save_steps: 500
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000

# SearchQA IWM — Stage 1 (WM warm-up)
# Paper §B.5: "1:1 ratio with the imitation learning dataset and train under the same settings"
#   ↳ since SR_K=2 yields ~159k IWM records vs 7.7k expert, paper used 1:1 by subsampling.
#     With concat strategy this means take a 1:1 random subset; or set num_train_epochs to
#     match the expert pass-count (1 IWM epoch ≈ 20 expert epochs at full IWM size).
# Simplest paper-faithful interpretation: just train IWM at the same configuration as IL.

### model
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: searchqa_iwm
dataset_dir: /mnt/data/xiangchao/verl-agent-ee-final/envs/searchqa/data/sft
template: qwen3_5_nothink
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/searchqa_iwm_stage1
logging_steps: 10
save_steps: 1000
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true
report_to: none

### train (effective bs = 128)
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000

# TravelPlanner SR (Self-Reflection mixed with expert)
# Paper §B.7: "For self-reflection, we extend the maximum generation length to 8K tokens
#              to accommodate detailed reasoning."

### model
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset (mixed)
dataset: travelplanner_expert,travelplanner_reflection
dataset_dir: /mnt/data/xiangchao/verl-agent-ee-final/envs/travelplanner/data/sft
mix_strategy: concat
template: qwen3_5_nothink
cutoff_len: 32768
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/travelplanner_sr
logging_steps: 10
save_steps: 200
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 1.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000

### generation length 设置（paper SR 扩到 8K，用于 inference / evaluation）
###   训练时 cutoff_len 已是 32K 足够覆盖输入+输出；eval 时把 max_new_tokens 调到 8192。

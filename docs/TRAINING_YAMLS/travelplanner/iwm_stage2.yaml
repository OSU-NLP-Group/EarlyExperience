# TravelPlanner IWM — Stage 2 (continue with expert)

### model
model_name_or_path: saves/travelplanner_iwm_stage1   # ← stage 1 输出
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: travelplanner_expert
dataset_dir: /mnt/data/xiangchao/verl-agent-ee-final/envs/travelplanner/data/sft
template: qwen3_5_nothink
cutoff_len: 32768
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/travelplanner_iwm_stage2
logging_steps: 10
save_steps: 200
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 1.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000
